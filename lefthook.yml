pre-commit:
  parallel: true
  commands:
    secrets:
      tags: security
      run: gitleaks protect --staged --redact --no-banner
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files} --max-warnings=0
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,yml,yaml}"
      run: pnpm exec prettier --check {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

pre-push:
  commands:
    test:
      run: pnpm test
