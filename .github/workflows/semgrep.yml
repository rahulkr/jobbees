name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Daily scan against main — catches issues introduced by dependency updates
  # or new Semgrep registry rules without waiting for the next PR
  schedule:
    - cron: "23 8 * * *" # 08:23 UTC daily (low traffic time)
  workflow_dispatch:

jobs:
  semgrep:
    name: Static analysis
    runs-on: ubuntu-latest

    # Run inside the official Semgrep container — fastest startup, deterministic version
    container:
      image: semgrep/semgrep:latest

    # Don't waste minutes on third-party PRs from forks without code access
    if: (github.actor != 'dependabot[bot]')

    permissions:
      contents: read
      # Needed for code scanning alerts (SARIF upload)
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PR diff scans need the merge base
          fetch-depth: 0

      - name: Semgrep scan (JOBBees rules + registry)
        run: |
          semgrep ci \
            --config ops/security/semgrep-rules.yml \
            --config p/typescript \
            --config p/nestjs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error
        env:
          # If/when we sign up for Semgrep AppSec Platform (free tier),
          # this token enables PR commenting + finding triage UI.
          # Until then, the scan runs without it — Semgrep CLI still works.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
